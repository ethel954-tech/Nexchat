<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexchat{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Base Slack-like palette */
            --primary: #4a154b;
            --primary-dark: #350d36;
            --background: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;

            /* Instagram-inspired accents */
            --accent: #fccc63;
            --accent-gradient: linear-gradient(45deg, #8a3ab9, #e95950, #fccc63);

            /* Status */
            --online: #22c55e;

            /* Legacy aliases */
            --panel-dark: #1e293b;
            --panel-light: #1e293b;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: rgba(241, 245, 249, 0.65);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--background);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .app-header {
            background: var(--primary);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            position: relative;
        }

        .icon-btn {
            background: none;
            border: none;
            color: rgba(241, 245, 249, 0.8);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .icon-btn:hover {
            color: #fff;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #111;
            cursor: pointer;
        }

        .dropdown-trigger {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 52px;
            right: 0;
            min-width: 200px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 50;
        }

        .dropdown-menu.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .dropdown-menu.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            color: var(--text);
            transition: background 0.15s ease;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .back-btn {
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            user-select: none;
        }

        .hidden {
            display: none !important;
        }

        /* Main Content */
        .app-main {
            flex: 1;
            overflow: hidden;
        }

        /* Hamburger Menu */
        .hamburger-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: var(--primary-dark);
            transition: left 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .hamburger-menu.open {
            left: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        .menu-overlay.show {
            display: block;
        }

        .menu-header {
            background: var(--background);
            padding: 60px 20px 20px;
        }

        .menu-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .menu-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 24px;
            color: #111;
        }

        .menu-user-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .menu-user-info p {
            font-size: 14px;
            color: #8696a0;
        }

        .menu-items {
            flex: 1;
            padding: 10px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 16px 20px;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .menu-item-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .menu-item-text {
            font-size: 16px;
        }

        /* Shared surfaces */
        .utility-card,
        .contacts-card,
        .chat-room-panel,
        .chat-list-panel,
        .status-panel,
        .profile-container,
        .info-card,
        .options,
        .utility-sidebar {
            background: var(--card);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .chat-list-panel {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-room-panel,
        .chat-room-sidebar,
        .contacts-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        button,
        .utility-actions button,
        .utility-form button {
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            border: none;
            transition: background 0.2s ease;
        }

        button:hover,
        .utility-actions button:hover,
        .utility-form button:hover {
            background: var(--primary-dark);
        }

        .notification,
        .unread-badge {
            background: var(--accent);
            color: #111;
            border-radius: 12px;
            padding: 2px 6px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: var(--online);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--background);
        }

        .status-ring {
            padding: 3px;
            border-radius: 50%;
            display: inline-flex;
            width: 78px;
            height: 78px;
            background: rgba(255, 255, 255, 0.08);
        }

        .status-ring.active {
            background: var(--accent-gradient);
        }

        .status-ring.inactive {
            background: rgba(255, 255, 255, 0.08);
        }

        .status-ring.empty {
            background: rgba(255, 255, 255, 0.04);
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .status-ring > .status-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>💬 Nexchat</h1>
            <div class="header-actions">
                <button class="icon-btn" id="notificationBtn" title="Notifications">🔔</button>
                {% if request.path == '/chats/' %}
                <div class="dropdown-trigger" id="globalDropdown">
                    <button class="icon-btn" id="menuButton" title="Menu">⋮</button>
                    <div class="dropdown-menu hidden" id="dropdownMenu">
                        <div class="dropdown-item" onclick="goToPage('/profile/')">Profile</div>
                        <div class="dropdown-item" onclick="goToPage('/contacts/')">Contacts</div>
                        <div class="dropdown-item" onclick="goToPage('/settings/')">Settings</div>
                        <div class="dropdown-item" onclick="goToPage('/channels/create/')">New Channel</div>
                    </div>
                </div>
                {% endif %}
                <div class="avatar" id="userAvatar">NC</div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Hamburger Menu -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <nav class="hamburger-menu" id="hamburgerMenu">
        <div class="menu-header">
            <div class="menu-profile">
                <div class="menu-avatar" id="menuAvatar">NC</div>
                <div class="menu-user-info">
                    <h3 id="menuUsername">Loading...</h3>
                    <p id="menuStatus">Available</p>
                </div>
            </div>
        </div>
        <div class="menu-items">
            <a class="menu-item" onclick="goTo('/profile/')">
                <span class="menu-item-icon">👤</span>
                <span class="menu-item-text">Profile</span>
            </a>
            <a class="menu-item" onclick="goTo('/contacts/')">
                <span class="menu-item-icon">📇</span>
                <span class="menu-item-text">Contacts</span>
            </a>
            <a class="menu-item" onclick="goTo('/groups/create/')">
                <span class="menu-item-icon">👥</span>
                <span class="menu-item-text">New Group</span>
            </a>
            <a class="menu-item" onclick="goTo('/channels/create/')">
                <span class="menu-item-icon">📢</span>
                <span class="menu-item-text">New Channel</span>
            </a>
            <a class="menu-item" onclick="goTo('/status/')">
                <span class="menu-item-icon">⭐</span>
                <span class="menu-item-text">Status</span>
            </a>
            <a class="menu-item" onclick="goTo('/settings/')">
                <span class="menu-item-icon">⚙️</span>
                <span class="menu-item-text">Settings</span>
            </a>
        </div>
    </nav>

    <script>
        function closeDropdownMenu() {
            const dropdown = document.getElementById('dropdownMenu');
            if (dropdown) {
                dropdown.classList.remove('show');
                dropdown.classList.add('hidden');
            }
        }

        function goToPage(url) {
            closeDropdownMenu();
            window.location.href = url;
        }

        function goTo(url) {
            goToPage(url);
        }

        function navigate(url) {
            goToPage(url);
        }

        function openProfile(userId) {
            if (!userId) return;
            window.location.href = `/profile/${userId}/`;
        }

        function goBack() {
            window.history.back();
        }

        function toggleMenu() {
            const menu = document.getElementById('hamburgerMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function closeMenu() {
            const menu = document.getElementById('hamburgerMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.remove('open');
            overlay.classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dropdown = document.getElementById('dropdownMenu');
            const button = document.getElementById('menuButton');
            const isMainPage = window.location.pathname === '/chats/';

            if (!isMainPage && dropdown) {
                dropdown.classList.add('hidden');
                return;
            }

            if (isMainPage && button && dropdown) {
                button.addEventListener('click', (event) => {
                    event.stopPropagation();
                    dropdown.classList.remove('hidden');
                    dropdown.classList.toggle('show');
                    if (!dropdown.classList.contains('show')) {
                        dropdown.classList.add('hidden');
                    }
                });

                document.addEventListener('click', (event) => {
                    if (dropdown.classList.contains('hidden')) {
                        return;
                    }
                    if (!dropdown.contains(event.target) && !button.contains(event.target)) {
                        closeDropdownMenu();
                    }
                });
            }
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
