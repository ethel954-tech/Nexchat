{% extends 'base.html' %}

{% block title %}Login - Nexchat{% endblock %}

{% block content %}
<div class="container">
    <h2> Nexchat</h2>
    <h3 style="text-align:center; margin-bottom:20px;">Welcome Back</h3>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required/>
        <input type="password" id="password" placeholder="Password" required/>
        <button type="submit">Login</button>
        <div id="error" class="error"></div>
    </form>
    <div class="link">
        Don't have an account? <a href="/api/users/register-page/">Register</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
    };
    const response = await fetch('/api/users/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    const result = await response.json();
    if (response.ok) {
        localStorage.setItem('access', result.access);
        localStorage.setItem('refresh', result.refresh);
        window.location.href = '/api/users/profile-page/';
    } else {
        document.getElementById('error').innerText = JSON.stringify(result);
    }
});
</script>
{% endblock %}t
