{% extends 'base.html' %}

{% block title %}Profile - Zynchat{% endblock %}

{% block content %}
<div class="container" style="max-width:500px;">
    <h2>💬 Zynchat</h2>
    <h3 style="text-align:center; margin-bottom:20px;">My Profile</h3>

    <div style="text-align:center; margin-bottom:20px;">
        <img id="profilePic" src="" alt="Profile" 
             style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#ddd; display:none;"/>
    </div>

    <div id="profileInfo">
        <p><strong>Username:</strong> <span id="username"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Phone:</strong> <span id="phone"></span></p>
        <p><strong>Status:</strong> <span id="status"></span></p>
        <p><strong>Last Seen Privacy:</strong> <span id="privacy"></span></p>
    </div>

    <br/>
    <button onclick="logout()" style="background:#e74c3c;">Logout</button>
    <div id="error" class="error"></div>
</div>

<script>
async function loadProfile() {
    const token = localStorage.getItem('access');
    if (!token) {
        window.location.href = '/api/users/login-page/';
        return;
    }
    const response = await fetch('/api/users/profile/', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        }
    });
    if (response.ok) {
        const data = await response.json();
        document.getElementById('username').innerText = data.username;
        document.getElementById('email').innerText = data.email;
        document.getElementById('phone').innerText = data.phone_number || 'Not set';
        document.getElementById('status').innerText = data.status;
        document.getElementById('privacy').innerText = data.last_seen_privacy;
        if (data.profile_picture) {
            document.getElementById('profilePic').src = data.profile_picture;
            document.getElementById('profilePic').style.display = 'block';
        }
    } else {
        window.location.href = '/api/users/login-page/';
    }
}

async function logout() {
    const refresh = localStorage.getItem('refresh');
    const token = localStorage.getItem('access');
    await fetch('/api/users/logout/', {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ refresh: refresh })
    });
    localStorage.clear();
    window.location.href = '/api/users/login-page/';
}

loadProfile();
</script>
{% endblock %}
